<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alif Aur Tarana</title>
  <style>
    :root { --cream:#f7f3ec; --ink:#2b2622; --muted:#8a8178; --maroon:#7c2d3a; --line:#e7ddcf; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
           background:var(--cream); color:var(--ink); }
    .wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px 80px; }
    h1 { font-weight: 600; letter-spacing:.3px; margin:.2em 0; }
    .sub { color:var(--muted); margin-top:0; }
    .who { display:flex; gap:10px; margin:18px 0; }
    .who button { flex:1; padding:12px; border:1px solid var(--line); background:#fff;
                  border-radius:12px; cursor:pointer; font-size:15px; transition:.15s; }
    .who button.active { border-color:var(--maroon); color:var(--maroon); box-shadow:0 1px 0 var(--maroon) inset; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; margin:14px 0; }
    .you { color:var(--muted); font-size:14px; margin:6px 2px; }
    .cue { color:var(--maroon); font-size:15px; font-style:italic; min-height:20px; margin:6px 2px; direction:rtl; }
    .urdu { font-size:30px; line-height:1.9; direction:rtl; text-align:right;
            font-family:"Noto Nastaliq Urdu","Jameel Noori Nastaleeq",serif; }
    .roman { font-size:16px; color:#4a433c; margin-top:10px; }
    .deva { font-size:16px; color:#4a433c; margin-top:4px; }
    .note { font-size:14px; color:var(--maroon); margin-top:10px; font-style:italic; }
    .row { display:flex; gap:10px; margin-top:14px; }
    textarea { flex:1; padding:12px; border:1px solid var(--line); border-radius:12px;
               font-size:15px; resize:vertical; min-height:48px; }
    .send { padding:0 18px; border:none; background:var(--maroon); color:#fff;
            border-radius:12px; cursor:pointer; font-size:15px; }
    .mic { background:#3a3633; }
    .mic.rec { background:#b3242f; }
    .send:disabled { opacity:.5; cursor:default; }
    .status { color:var(--muted); font-size:13px; min-height:18px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Alif <span style="color:var(--maroon)">aur</span> Tarana</h1>
    <p class="sub">Bulaaiye unhe — "Alif suno" — aur baat kijiye. Voice + tri-script.</p>

    <div class="who">
      <button id="alif" class="active">Alif — the romantic</button>
      <button id="tarana">Tarana — the elegant</button>
    </div>

    <div class="row">
      <textarea id="text" placeholder='Try "Alif suno", phir kuch poochhiye…'></textarea>
      <button id="send" class="send">Bhejiye</button>
      <button id="mic" class="send mic" title="Bol kar baat kijiye">🎙</button>
    </div>
    <div class="status" id="status">connecting…</div>
    <div class="you" id="you"></div>
    <div class="cue" id="cue"></div>

    <div class="card" id="out" style="display:none">
      <div class="urdu" id="urdu"></div>
      <div class="roman" id="roman"></div>
      <div class="deva" id="deva"></div>
      <div class="note" id="note"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let companion = "alif";
    for (const id of ["alif", "tarana"]) {
      $(id).onclick = () => {
        companion = id;
        $("alif").classList.toggle("active", id === "alif");
        $("tarana").classList.toggle("active", id === "tarana");
      };
    }

    // --- sequential audio queue (cue plays before reply) ---
    const q = [];
    let playing = false;
    function enqueue(b64) {
      if (!b64) return;
      q.push("data:audio/mp3;base64," + b64);
      if (!playing) playNext();
    }
    function playNext() {
      if (!q.length) { playing = false; return; }
      playing = true;
      const a = new Audio(q.shift());
      a.onended = playNext;
      a.onerror = playNext;
      a.play().catch(playNext);
    }

    // --- websocket ---
    let ws, ready = false;
    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${proto}://${location.host}/converse`);
      ws.onopen = () => { ready = true; $("status").textContent = ""; };
      ws.onclose = () => { ready = false; $("status").textContent = "disconnected — reload"; };
      ws.onmessage = (ev) => {
        const m = JSON.parse(ev.data);
        if (m.type === "transcript") { $("you").textContent = "Aap: " + (m.text || ""); }
        else if (m.type === "cue") { $("cue").textContent = m.text || ""; enqueue(m.audio_b64); }
        else if (m.type === "reply") {
          $("cue").textContent = "";
          $("urdu").textContent = m.display.urdu;
          $("roman").textContent = m.display.roman;
          $("deva").textContent = m.display.devanagari;
          $("note").textContent = m.english_note || "";
          $("out").style.display = "block";
          enqueue(m.audio_b64);
          $("status").textContent = m.audio_b64 ? "" : "(reply audio unavailable — TTS quota; text shown)";
        } else if (m.type === "error") { $("status").textContent = "Error: " + m.message; }
      };
    }
    connect();

    function sendText() {
      const text = $("text").value.trim();
      if (!text || !ready) return;
      $("you").textContent = "Aap: " + text;
      ws.send(JSON.stringify({ type: "text", companion, text }));
    }
    $("send").onclick = sendText;
    $("text").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) sendText();
    });

    // --- mic ---
    let recorder = null, chunks = [];
    const toB64 = (blob) => new Promise((res) => {
      const r = new FileReader(); r.onloadend = () => res(r.result.split(",")[1]); r.readAsDataURL(blob);
    });
    $("mic").onclick = async () => {
      if (recorder && recorder.state === "recording") { recorder.stop(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream); chunks = [];
        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          $("mic").classList.remove("rec"); $("mic").textContent = "🎙";
          const b64 = await toB64(new Blob(chunks, { type: recorder.mimeType || "audio/webm" }));
          if (ready) ws.send(JSON.stringify({ type: "audio", companion, audio_b64: b64 }));
        };
        recorder.start();
        $("mic").classList.add("rec"); $("mic").textContent = "⏹";
        $("status").textContent = "sun rahe hain…";
      } catch (e) { $("status").textContent = "Mic error: " + e.message; }
    };
  </script>
</body>
</html>
