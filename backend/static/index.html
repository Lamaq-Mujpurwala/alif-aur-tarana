<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alif Aur Tarana</title>
  <style>
    :root { --cream:#f7f3ec; --ink:#2b2622; --muted:#8a8178; --maroon:#7c2d3a; --line:#e7ddcf; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
           background:var(--cream); color:var(--ink); }
    .wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px 80px; }
    h1 { font-weight: 600; letter-spacing:.3px; margin:.2em 0; }
    .sub { color:var(--muted); margin-top:0; }
    .who { display:flex; gap:10px; margin:18px 0; }
    .who button { flex:1; padding:12px; border:1px solid var(--line); background:#fff;
                  border-radius:12px; cursor:pointer; font-size:15px; transition:.15s; }
    .who button.active { border-color:var(--maroon); color:var(--maroon); box-shadow:0 1px 0 var(--maroon) inset; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; margin:14px 0; }
    .urdu { font-size:30px; line-height:1.9; direction:rtl; text-align:right;
            font-family:"Noto Nastaliq Urdu","Jameel Noori Nastaleeq",serif; }
    .roman { font-size:16px; color:#4a433c; margin-top:10px; }
    .deva { font-size:16px; color:#4a433c; margin-top:4px; }
    .note { font-size:14px; color:var(--maroon); margin-top:10px; font-style:italic; }
    .row { display:flex; gap:10px; margin-top:14px; }
    textarea { flex:1; padding:12px; border:1px solid var(--line); border-radius:12px;
               font-size:15px; resize:vertical; min-height:48px; }
    .send { padding:0 20px; border:none; background:var(--maroon); color:#fff;
            border-radius:12px; cursor:pointer; font-size:15px; }
    .send:disabled { opacity:.5; cursor:default; }
    .status { color:var(--muted); font-size:13px; min-height:18px; margin-top:8px; }
    audio { width:100%; margin-top:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Alif <span style="color:var(--maroon)">aur</span> Tarana</h1>
    <p class="sub">Urdu, mehsoos kijiye. Talk to a companion — they answer in voice, tri-script.</p>

    <div class="who">
      <button id="alif" class="active">Alif — the romantic</button>
      <button id="tarana">Tarana — the elegant</button>
    </div>

    <div class="row">
      <textarea id="text" placeholder="Kuch poochhiye… e.g. 'firaaq' ka matlab samjhao"></textarea>
      <button id="send" class="send">Bhejiye</button>
    </div>
    <div class="status" id="status"></div>

    <div class="card" id="out" style="display:none">
      <div class="urdu" id="urdu"></div>
      <div class="roman" id="roman"></div>
      <div class="deva" id="deva"></div>
      <div class="note" id="note"></div>
      <audio id="audio" controls autoplay></audio>
    </div>
  </div>

  <script>
    let companion = "alif";
    const $ = (id) => document.getElementById(id);
    for (const id of ["alif", "tarana"]) {
      $(id).onclick = () => {
        companion = id;
        $("alif").classList.toggle("active", id === "alif");
        $("tarana").classList.toggle("active", id === "tarana");
      };
    }
    async function send() {
      const text = $("text").value.trim();
      if (!text) return;
      $("send").disabled = true;
      $("status").textContent = companion + " soch rahe/rahi hain…";
      try {
        const res = await fetch("/turn", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ companion, text }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const d = data.turn.display;
        $("urdu").textContent = d.urdu;
        $("roman").textContent = d.roman;
        $("deva").textContent = d.devanagari;
        $("note").textContent = data.turn.english_note || "";
        if (data.audio_b64) $("audio").src = "data:audio/mp3;base64," + data.audio_b64;
        $("out").style.display = "block";
        $("status").textContent = "";
      } catch (e) {
        $("status").textContent = "Error: " + e.message;
      } finally {
        $("send").disabled = false;
      }
    }
    $("send").onclick = send;
    $("text").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) send();
    });
  </script>
</body>
</html>
